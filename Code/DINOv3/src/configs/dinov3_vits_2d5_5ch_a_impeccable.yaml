model:
  name: dinov3_vits16
  weights: ../../weights/dinov3_vits16_pretrain_lvd1689m-08c60483.pth
  in_chans: 5
  lora_rank: 0
  lora_alpha: 64
  lora_dropout: 0.1
  lora_targets: [qkv, proj]

data:
  source: image_impeccable
  root_dir: ../../../Dataset/ThinkOnwards/training_data/extracted
  mode: "2.5d_5ch"
  n_train: 20
  n_val: 5
  n_test: 5
  slice_stride: 5
  crop_size: 224
  seed: 42

training:
  epochs: 50
  batch_size: 16
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_epochs: 5
  loss_lambda: 0.5
  num_workers: 0

output:
  checkpoint_dir: ../../../../experiments/runs/5ch/impeccable_a_patch_emb_head_v1
