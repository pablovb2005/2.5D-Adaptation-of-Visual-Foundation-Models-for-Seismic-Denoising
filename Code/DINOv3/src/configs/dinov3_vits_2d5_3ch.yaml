model:
  name: dinov3_vits16
  weights: ../../weights/dinov3_vits16_pretrain_lvd1689m-08c60483.pth
  lora_rank: 16
  lora_alpha: 64
  lora_dropout: 0.1
  lora_targets: [qkv, proj]

data:
  # seismic_3ch/ contains 3-channel .dat files generated by gen_2d5_3ch.py
  # label_3ch/   contains single-channel .dat files (clean central slice)
  seismic_dir: ../../../Dataset/Denoise/seismic_3ch
  label_dir:   ../../../Dataset/Denoise/label_3ch
  field_dir:   ../../../Dataset/Denoise/field
  val_split: 0.1
  seed: 42
  mode: "2.5d_3ch"

training:
  epochs: 50
  batch_size: 16
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_epochs: 5
  loss_lambda: 0.5
  num_workers: 0

output:
  checkpoint_dir: ../../../../experiments/runs/3ch/sfm_legacy
