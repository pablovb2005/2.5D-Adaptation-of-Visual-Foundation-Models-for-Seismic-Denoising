model:
  name: dinov3_vits16
  weights: ../../weights/dinov3_vits16_pretrain_lvd1689m-08c60483.pth
  in_chans: 5
  lora_rank: 16
  lora_alpha: 64
  lora_dropout: 0.1
  lora_targets: [qkv, proj]

data:
  source: image_impeccable
  root_dir: /tudelft.net/staff-bulk/ewi/insy/PRLab/Students/pvarelabernal/Dataset/ThinkOnwards/training_data/full250_canonical/extracted
