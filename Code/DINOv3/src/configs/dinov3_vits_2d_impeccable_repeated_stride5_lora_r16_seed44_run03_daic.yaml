model:
  name: dinov3_vits16
  weights: ../../weights/dinov3_vits16_pretrain_lvd1689m-08c60483.pth
  lora_rank: 16
  lora_alpha: 64
  lora_dropout: 0.1
  lora_targets: [qkv, proj]

data:
  source: image_impeccable
  root_dir: /tudelft.net/staff-bulk/ewi/insy/PRLab/Students/pvarelabernal/Dataset/ThinkOnwards/training_data/extracted
  mode: "2d"
  n_train: 20
  n_val: 5
  n_test: 5
  slice_stride: 5
  crop_size: 224
  seed: 42
  cache_volumes: true

training:
  epochs: 50
  seed: 44
  batch_size: 16
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_epochs: 5
  loss_lambda: 0.5
  num_workers: 0
  persistent_workers: true
  log_interval_batches: 25
  resume: true
  max_runtime_minutes: 700

output:
  checkpoint_dir: /tudelft.net/staff-bulk/ewi/insy/PRLab/Students/pvarelabernal/experiments/runs/2d/impeccable_repeated_stride5_lora_r16/seed44_run03
